[build]
  command = "npm run build"
  publish = ".next"

# NEXT_PUBLIC_* 變數本來就會被 Next.js 打包進前端 JS bundle（設計如此）
# 告知 Netlify secrets scanning 略過這些 key，避免誤判阻擋 build
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_ADMIN_PASSWORD"

[[plugins]]
  package = "@netlify/plugin-nextjs"
